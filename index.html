<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임 동향 분석 리포트</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0812'/%3E%3Crect x='5' y='12' width='22' height='11' rx='3' fill='none' stroke='%237c5cff' stroke-width='2'/%3E%3Cpath d='M9 16v3M7.5 17.5h3' stroke='%237c5cff' stroke-width='1.5' stroke-linecap='round'/%3E%3Crect x='20' y='20' width='2' height='2' rx='0.5' fill='%237c5cff'/%3E%3Crect x='23' y='17' width='2' height='5' rx='0.5' fill='%237c5cff'/%3E%3Crect x='26' y='14' width='2' height='8' rx='0.5' fill='%23b088ff'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #06060c;
    color: #e0e0e8;
    height: 100vh;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(120, 80, 255, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120, 80, 255, 0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  /* Header */
  .header {
    position: relative; z-index: 2;
    height: 60px;
    display: flex; align-items: center;
    padding: 0 28px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    background: rgba(6,6,12,0.9);
    backdrop-filter: blur(12px);
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, #c8b0ff, #7c5cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .sub {
    font-size: 11px;
    color: #555;
    margin-left: 16px;
    font-weight: 300;
  }

  /* Layout */
  .app { display: flex; height: calc(100vh - 60px); position: relative; z-index: 1; }

  /* Left Panel */
  .sidebar {
    width: 320px;
    min-width: 320px;
    border-right: 1px solid rgba(255,255,255,0.04);
    overflow-y: auto;
    padding: 20px 16px;
    background: rgba(10,8,18,0.8);
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(120,80,255,0.2); border-radius: 2px; }

  .sidebar-label {
    font-size: 11px;
    font-weight: 500;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 12px;
    margin-bottom: 12px;
  }

  #search-input {
    width: calc(100% - 24px);
    margin: 0 12px 12px;
    padding: 8px 12px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 8px;
    color: #ccc;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  #search-input::placeholder { color: #555; }
  #search-input:focus { border-color: rgba(120,80,255,.3); }

  .game-card {
    padding: 16px 20px;
    margin-bottom: 8px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    border: 1px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 12px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .game-card:hover {
    background: rgba(255,255,255,0.02);
    border-color: rgba(255,255,255,0.04);
  }
  .game-card.active {
    border-color: rgba(120,80,255,0.25);
    background: rgba(120,80,255,0.06);
  }
  .game-card.active::before {
    background: linear-gradient(135deg, rgba(120,80,255,0.08), transparent);
    opacity: 1;
  }

  .game-card .badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: inline-block;
  }
  .game-card .badge.netease { color: #ff6b9d; }
  .game-card .badge.rockstar { color: #ff8c00; }
  .game-card .badge.perfectworld { color: #7c5cff; }
  .game-card .badge.krafton { color: #26a69a; }
  .game-card .badge.sony { color: #0070cc; }
  .game-card .badge.digital-extremes { color: #a46cff; }

  .game-card .title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .game-card .genre {
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
  }
  .game-card .desc {
    font-size: 12px;
    color: #555;
    line-height: 1.5;
  }
  .game-card .game-date {
    font-size: 11px;
    color: #444;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }
  .game-card .tags {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 8px;
  }
  .game-card .tags span {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    color: #666;
  }

  /* Right Panel */
  .main {
    flex: 1;
    position: relative;
    background: #06060c;
    overflow: hidden;
  }
  .main .frame-wrap {
    width: 100%;
    height: 100%;
    background: #06060c;
    border-left: 1px solid rgba(120, 80, 255, 0.06);
  }
  .main iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #06060c;
  }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #444;
  }
  .placeholder .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .placeholder p {
    font-size: 14px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { width: 240px; min-width: 240px; padding: 16px 12px; }
    .game-card .title { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="header">
  <h1>게임 동향 분석 리포트</h1>
  <span class="sub">Post-Launch Analysis · 2026</span>
</div>

<div class="app">
  <!-- Left Panel -->
  <div class="sidebar">
    <div class="sidebar-label">Analysis Reports</div>
    <input id="search-input" type="text" placeholder="게임명, 장르, 태그로 검색..." oninput="filterCards()">
    <div id="game-cards-container"></div>
  </div>
  <div class="main" id="report-frame-container">
    <div class="frame-wrap">
      <iframe id="report-frame"></iframe>
    </div>
  </div>
</div>

<script>
  let allReports = [];

  // Load reports from JSON and render game cards
  async function loadReports() {
    try {
      const response = await fetch('reports.json');
      allReports = await response.json();
      // Sort by written date descending (newest first)
      allReports.sort((a, b) => {
        const p = s => { const x = s.replace(/\./g,'').trim().split(/\s+/); return new Date(x[0],x[1]-1,x[2]); };
        return p(b.written) - p(a.written);
      });
      renderCards(allReports);
      loadReport(allReports[0].id);
    } catch (error) {
      console.error('Error loading reports:', error);
    }
  }

  function renderCards(reports) {
    const container = document.getElementById('game-cards-container');
    container.innerHTML = '';
    reports.forEach((report, index) => {
      const card = document.createElement('div');
      card.className = 'game-card' + (index === 0 ? ' active' : '');
      card.setAttribute('data-id', report.id);
      card.setAttribute('onclick', `loadReport('${report.id}')`);
      
      card.innerHTML = `
        <div class="badge ${report.badge.class}">${report.badge.text}</div>
        <div class="title">${report.title}</div>
        <div class="genre">${report.genre}</div>
        <div class="desc">${report.desc}</div>
        <div class="game-date">작성일 ${report.written}</div>
        <div class="tags">
          ${report.tags.map(tag => `<span>${tag}</span>`).join('')}
        </div>
      `;
      
      container.appendChild(card);
    });
  }

  function filterCards() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allReports.filter(r =>
      r.title.toLowerCase().includes(q) ||
      r.genre.toLowerCase().includes(q) ||
      r.desc.toLowerCase().includes(q) ||
      r.tags.some(t => t.toLowerCase().includes(q))
    );
    renderCards(filtered);
  }

  function loadReport(name) {
    const frame = document.getElementById('report-frame');
    const cards = document.querySelectorAll('.game-card');
    cards.forEach(c => c.classList.remove('active'));
    const report = allReports.find(r => r.id === name);
    if (report) {
      frame.src = report.url;
      const target = document.querySelector(`.game-card[data-id="${name}"]`);
      if (target) target.classList.add('active');
    }
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', loadReports);
</script>
</body>
</html>
